name: Image Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/tensorlabresearch/kokoros:${{ github.ref_name }}
            ghcr.io/tensorlabresearch/kokoros:sha-${{ github.sha }}

      - name: Ensure GHCR image package is public
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/tensorlabresearch/packages/container/kokoros/visibility \
            -f visibility=public

      - name: Scan image (Trivy)
        id: trivy
        if: steps.build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/tensorlabresearch/kokoros:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: steps.build.outcome == 'success' && steps.trivy.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Publish digest summary
        run: |
          {
            echo "### Image Published"
            echo ""
            echo "- Image: \`ghcr.io/tensorlabresearch/kokoros:${{ github.ref_name }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
