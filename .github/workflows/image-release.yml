name: Image Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            docker.io/mechaminds/kokoros:${{ github.ref_name }}
            docker.io/mechaminds/kokoros:sha-${{ github.sha }}

      - name: Scan image (Trivy)
        id: trivy
        if: steps.build.outcome == 'success'
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: docker.io/mechaminds/kokoros:${{ github.ref_name }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        if: steps.build.outcome == 'success' && steps.trivy.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Publish digest summary
        run: |
          {
            echo "### Image Published"
            echo ""
            echo "- Image: \`docker.io/mechaminds/kokoros:${{ github.ref_name }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
