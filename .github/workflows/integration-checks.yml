name: Integration Checks

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Chart version to install from OCI and Pages"
        required: true
        default: "0.1.7"

permissions:
  contents: read
  packages: read

jobs:
  install-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Install from OCI
        run: |
          helm install kokoros-oci oci://ghcr.io/tensorlabresearch/charts/kokoros \
            --version "${{ inputs.chart_version }}" \
            --namespace kokoros-oci --create-namespace \
            --set gpu.enabled=false \
            --set persistence.models.enabled=false \
            --set modelPreload.enabled=false

      - name: Install from Pages index
        run: |
          helm repo add tensorlab-kokoros https://tensorlabresearch.github.io/helm-kokoros
          helm repo update
          helm install kokoros-pages tensorlab-kokoros/kokoros \
            --version "${{ inputs.chart_version }}" \
            --namespace kokoros-pages --create-namespace \
            --set gpu.enabled=false \
            --set persistence.models.enabled=false \
            --set modelPreload.enabled=false

      - name: Verify manifests include expected GPU key when enabled
        run: |
          helm template gpu-check oci://ghcr.io/tensorlabresearch/charts/kokoros \
            --version "${{ inputs.chart_version }}" > /tmp/render.yaml
          grep -q "nvidia.com/gpu" /tmp/render.yaml
