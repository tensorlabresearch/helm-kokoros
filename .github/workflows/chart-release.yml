name: Chart Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint --strict charts/kokoros

      - name: Helm template (default values)
        run: helm template kokoros charts/kokoros > /tmp/kokoros-default.yaml

      - name: Helm template (preload-heavy values)
        run: |
          cat > /tmp/kokoros-preload-values.yaml <<'YAML'
          gpu:
            enabled: false
          modelPreload:
            enabled: true
            continueOnError: false
            items:
              - id: custom-model
                url: https://example.com/model.bin
                filename: model.bin
                targetSubdir: custom
                sha256: ""
          kokoros:
            activeBundle: default
            bundles:
              - name: default
                modelPath: checkpoints/kokoro-v1.0.onnx
                voicesPath: data/voices-v1.0.bin
                preload:
                  - id: bundle-model
                    url: https://example.com/bundle-model.onnx
                    filename: bundle-model.onnx
                    targetSubdir: checkpoints
                    sha256: ""
          YAML
          helm template kokoros charts/kokoros -f /tmp/kokoros-preload-values.yaml > /tmp/kokoros-preload.yaml

      - name: Validate rendered preload and GPU manifests
        run: |
          grep -q "initContainers:" /tmp/kokoros-preload.yaml
          grep -q "sha256sum -c -" /tmp/kokoros-preload.yaml
          grep -q "nvidia.com/gpu" /tmp/kokoros-default.yaml
          grep -q "openai" /tmp/kokoros-default.yaml

  release:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Configure git user for gh-pages index updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Package chart
        run: |
          rm -rf .cr-release-packages
          mkdir -p .cr-release-packages
          cr package charts/kokoros --package-path .cr-release-packages

      - name: Upload chart release assets
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cr upload \
            --owner tensorlabresearch \
            --git-repo helm-kokoros \
            --token "${CR_TOKEN}" \
            --skip-existing \
            --commit "$(git rev-parse HEAD)" \
            --pages-branch gh-pages

      - name: Update gh-pages index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cr-index
          cr index \
            --owner tensorlabresearch \
            --git-repo helm-kokoros \
            --token "${CR_TOKEN}" \
            --push \
            --pages-branch gh-pages

      - name: Resolve chart metadata
        id: chart
        run: |
          chart_name="kokoros"
          chart_version="$(awk '/^version:/ {print $2; exit}' charts/kokoros/Chart.yaml)"
          chart_package=".cr-release-packages/${chart_name}-${chart_version}.tgz"
          echo "name=${chart_name}" >> "$GITHUB_OUTPUT"
          echo "version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "package=${chart_package}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for OCI chart push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR OCI (skip when version already exists)
        id: oci
        run: |
          set -euo pipefail
          chart_ref="oci://ghcr.io/tensorlabresearch/charts/${{ steps.chart.outputs.name }}"
          chart_version="${{ steps.chart.outputs.version }}"
          chart_package="${{ steps.chart.outputs.package }}"

          if helm show chart "${chart_ref}" --version "${chart_version}" >/dev/null 2>&1; then
            echo "OCI chart ${chart_ref}:${chart_version} already exists; skipping push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          helm push "${chart_package}" oci://ghcr.io/tensorlabresearch/charts
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Ensure GHCR OCI chart package is public
        if: steps.oci.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/tensorlabresearch/packages/container/charts%2Fkokoros/visibility \
            -f visibility=public; then
            echo "Skipping OCI chart package visibility update; configure package visibility manually in GHCR."
          fi

      - name: Release summary
        run: |
          {
            echo "### Chart Release"
            echo ""
            echo "- Chart: \`${{ steps.chart.outputs.name }}\`"
            echo "- Version: \`${{ steps.chart.outputs.version }}\`"
            echo "- OCI pushed this run: \`${{ steps.oci.outputs.pushed }}\`"
            echo "- OCI base: \`oci://ghcr.io/tensorlabresearch/charts\`"
            echo "- Pages repo: \`https://tensorlabresearch.github.io/helm-kokoros\`"
          } >> "$GITHUB_STEP_SUMMARY"
