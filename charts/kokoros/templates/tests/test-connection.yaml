apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kokoros.fullname" . }}-test-connection"
  labels:
    {{- include "kokoros.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - wget -qO- http://{{ include "kokoros.fullname" . }}:{{ .Values.service.port }}/
  restartPolicy: Never
